<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Modération - Nantes RP</title>
    <link rel="stylesheet" href="css/moderator-panel.css">
</head>
<body>

<header>
    <div class="nav-container">
        <h1 class="logo">Nantes <span>RP</span></h1>

        <nav class="navbar">
            <a href="index.html">Accueil</a>
            <a href="jobs.html">Métiers</a>
            <a href="recrutements.html">Recrutements</a>
            <a href="candidatureStaff.html">Devenir Testeur Roblox</a>
            <a href="connexion.html">Déconnexion</a>
        </nav>
    </div>
</header>

<section class="panel-section">

    <h2>Statistiques du Jeu Roblox</h2>

    <div class="stats-card">
        <h3 id="gameName">Chargement...</h3>

        <p><strong>Joueurs Actuels :</strong> <span id="playing">...</span></p>
        <p><strong>Visites :</strong> <span id="visits">...</span></p>
        <p><strong>Favoris :</strong> <span id="favorites">...</span></p>
        <p><strong>Likes :</strong> <span id="likes">...</span></p>
        <p><strong>Dislikes :</strong> <span id="dislikes">...</span></p>
        <p><strong>Max Joueurs :</strong> <span id="maxPlayers">...</span></p>
        <p><strong>Description :</strong></p>
        <p id="description" class="desc">...</p>
    </div>

</section>

<script>
// ====== CONFIG ======
const UNIVERSE_ID = "9266409859"; // ← Mets ton Universe ID Roblox ici

async function loadStats() {
    try {
        const url = `https://games.roblox.com/v1/games?universeIds=${UNIVERSE_ID}`;
        const res = await fetch(url);
        const data = await res.json();

        const game = data.data[0];

        document.getElementById("gameName").textContent = game.name;
        document.getElementById("playing").textContent = game.playing;
        document.getElementById("visits").textContent = game.visits.toLocaleString();
        document.getElementById("favorites").textContent = game.favoritedCount.toLocaleString();
        document.getElementById("likes").textContent = game.likes;
        document.getElementById("dislikes").textContent = game.dislikes;
        document.getElementById("maxPlayers").textContent = game.maxPlayers;
        document.getElementById("description").textContent = game.description || "Aucune description.";
    } 
    catch (err) {
        document.getElementById("gameName").textContent = "Erreur de chargement";
        console.error(err);
    }
}

loadStats();
</script>

</body>
</html>
