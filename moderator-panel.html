<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Modération - Nantes RP</title>
    <link rel="stylesheet" href="css/moderator-panel.css">
</head>
<body>

<header>
    <div class="nav-container">
        <h1 class="logo">Nantes <span>RP</span></h1>

        <nav class="navbar">
            <a href="index.html">Accueil</a>
            <a href="jobs.html">Métiers</a>
            <a href="recrutements.html">Recrutements</a>
            <a href="candidatureStaff.html">Devenir Testeur Roblox</a>
            <a href="connexion.html">Déconnexion</a>
        </nav>
    </div>
</header>

<section class="panel-section">

    <h2>Statistiques du Jeu Roblox</h2>

    <div class="stats-card">
    <h3 id="gameName">Chargement...</h3>

    <p><strong>Joueurs Actuels :</strong> <span id="playing">...</span></p>
    <p><strong>Visites :</strong> <span id="visits">...</span></p>
    <p><strong>Favoris :</strong> <span id="favorites">...</span></p>
    <p><strong>Likes :</strong> <span id="likes">...</span></p>
    <p><strong>Dislikes :</strong> <span id="dislikes">...</span></p>
    <p><strong>Max Joueurs :</strong> <span id="maxPlayers">...</span></p>

    <h3>Répartition par équipes</h3>
    <div id="teams"></div>

    <p><strong>Description :</strong></p>
    <p id="description" class="desc">...</p>
</div>

</section>

<script>
// ====== CONFIG ======
const API_URL = "https://roblox-stats-api.onrender.com/stats"; // Ton API Render

async function loadStats() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // ====== STATS GLOBALES ======
        document.getElementById("gameName").textContent = data.name;
        document.getElementById("playing").textContent = data.playing;
        document.getElementById("visits").textContent = data.visits.toLocaleString();
        document.getElementById("favorites").textContent = data.favorites.toLocaleString();
        document.getElementById("likes").textContent = data.likes;
        document.getElementById("dislikes").textContent = data.dislikes;
        document.getElementById("maxPlayers").textContent = data.maxPlayers;
        document.getElementById("description").textContent = data.description || "Aucune description.";

        // ====== TEAMS ======
        const teamsContainer = document.getElementById("teams");
        teamsContainer.innerHTML = ""; // reset

        for (const teamName in data.teams) {
            const count = data.teams[teamName];

            const div = document.createElement("div");
            div.className = "team-line";
            div.innerHTML = `<strong>${teamName} :</strong> ${count} joueur(s)`;

            teamsContainer.appendChild(div);
        }

    } catch (err) {
        console.error(err);
        document.getElementById("gameName").textContent = "Erreur API";
    }
}

// Refresh toutes les 10 secondes
loadStats();
setInterval(loadStats, 10000);
</script>


</body>
</html>
