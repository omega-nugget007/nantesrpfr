        ],

        "Mairie de Nantes": [
            // tu ajoutes ici
        ],

        "DIR Atlantique": [
            // tu ajoutes ici
        ]
    };

    function updateGrades() {
        const selected = metierSelect.value;
        const list = grades[selected] || [];

        gradeSelect.innerHTML = "";

        list.forEach(g => {
            const option = document.createElement("option");

            // 🔥 Si c’est un titre → disabled + style
            if (g.startsWith("====")) {
                option.textContent = g;
                option.disabled = true;
                option.style.fontWeight = "bold";
                option.style.background = "#ddd";
            } else {
                option.textContent = g;
                option.value = g;
            }

            gradeSelect.appendChild(option);
        });
    }

    metierSelect.addEventListener("change", updateGrades);
    updateGrades();
</script>


<!-- 🔥 SCRIPT FIREBASE + ENVOI DES DONNÉES -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getFirestore, collection, addDoc, 
    query, where, getDocs, orderBy, limit 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCK1VRjC3CvHdz4JARRLp8je61ztBDXqRY",
    authDomain: "candidatures-metiers-staffs.firebaseapp.com",
    projectId: "candidatures-metiers-staffs",
    storageBucket: "candidatures-metiers-staffs.appspot.com",
    messagingSenderId: "798655660932",
    appId: "1:798655660932:web:3077faa73e3f916a7793d1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



// 🔥 Vérification COOLDOWN 24H
async function peutCandidaterMetier(discordID) {
    const q = query(
        collection(db, "candidatures_metiers"),
        where("discordID", "==", discordID),
        orderBy("date", "desc"),
        limit(1)
    );

    const snap = await getDocs(q);

    if (snap.empty) return { ok: true };

    const last = snap.docs[0].data();
    const lastDate = last.date.toDate();
    const now = new Date();

    const diffHeures = (now - lastDate) / (1000 * 60 * 60);

    if (diffHeures < 24) {
        return {
            ok: false,
            reason: "cooldown",
            hoursLeft: Math.ceil(24 - diffHeures)
        };
    }

    return { ok: true };
}



// 🔥 Envoi candidature métiers
async function envoyerMetiers() {

    const discord = document.getElementById("discord").value;
    const discordID = document.getElementById("discordID").value;
    const age = document.getElementById("age").value;
    const metier = document.getElementById("metier").value;
    const grade = document.getElementById("grade").value;
    const motivation = document.getElementById("motivation").value;

    // Vérification cooldown
    const check = await peutCandidaterMetier(discordID);

    if (!check.ok) {
        document.getElementById("statusMessage").textContent =
            `❌ Vous devez attendre encore ${check.hoursLeft} heures avant de refaire une candidature.`;
        return;
    }

    // Envoi Firebase
    await addDoc(collection(db, "candidatures_metiers"), {
        discord,
        discordID,
        age,
        metier,
        grade,
        motivation,
        typeRecrutement: "metier",
        accepte: "N/A",
        date: new Date()
    });

    document.getElementById("statusMessage").textContent =
        "Candidature envoyée avec succès !";
}



// 🔥 Empêcher rechargement
document.getElementById("recrutementForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    await envoyerMetiers();
    e.target.reset();
});
</script>
