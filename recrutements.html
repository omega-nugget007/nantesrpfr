<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recrutements - Nantes RP</title>
    <link rel="stylesheet" href="css/recrutements.css">
</head>
<body>

<header>
    <div class="nav-container">
        <h1 class="logo">Nantes <span>RP</span></h1>

        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">&#9776;</label>

        <nav class="navbar">
            <a href="index.html">Accueil</a>
            <a href="jobs.html">Métiers</a>
            <a href="recrutements.html">Recrutements</a>
            <a href="candidatureStaff.html">Devenir Staff</a>
            <a href="connexion.html">Connexion Staff</a>
        </nav>
    </div>
</header>

<section class="form-section">

    <h2>Recrutements Métiers</h2>

    <form id="recrutementForm">

        <input type="text" id="discord" placeholder="Pseudo Discord" required>
        <input type="number" id="age" placeholder="Âge" required>

        <select id="metier">
            <option>Police Nationale</option>
            <option>SDIS 44</option>
            <option>Neolib</option>
            <option>Mairie de Nantes</option>
            <option>DIR Atlantique</option>
        </select>

        <textarea id="motivation" placeholder="Motivation" required></textarea>

        <button type="submit">Envoyer</button>
    </form>

    <p id="statusMessage"></p>
</section>

<!-- 🔥 SCRIPT FIREBASE + ENVOI DES DONNÉES -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCK1VRjC3CvHdz4JARRLp8je61ztBDXqRY",
        authDomain: "candidatures-metiers-staffs.firebaseapp.com",
        projectId: "candidatures-metiers-staffs",
        storageBucket: "candidatures-metiers-staffs.appspot.com",
        messagingSenderId: "798655660932",
        appId: "1:798655660932:web:3077faa73e3f916a7793d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔥 Fonction d’envoi des candidatures MÉTIERS

    async function envoyerMetiers() {
    const email = document.getElementById("email").value;
    const discord = document.getElementById("discord").value;
    const age = document.getElementById("age").value;
    const metier = document.getElementById("metier").value;
    const motivation = document.getElementById("motivation").value;

    await addDoc(collection(db, "candidatures_metiers"), {
        email,
        discord,
        age,
        metier,
        motivation,
        accepte: "N/A",   // 🔥 Ajout du statut
        date: new Date()
    });

    document.getElementById("statusMessage").textContent =
        "Candidature envoyée avec succès !";
}



    // 🔥 Empêcher le rechargement + appeler envoyerMetiers()
    document.getElementById("recrutementForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        await envoyerMetiers();
        e.target.reset();
    });
</script>

</body>
</html>
