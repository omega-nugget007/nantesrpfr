<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Staff - Nantes RP</title>
    <link rel="stylesheet" href="css/connexion.css">
</head>
<body>

<div class="login-container">
    <h2>Connexion Staff</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Nom d'utilisateur" required>
        <input type="password" id="password" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>

    <p id="errorMessage"></p>
</div>

<script>
// Comptes autorisés
const accounts = {
    "moderator": {
        password: "nantesrp2026",
        redirect: "moderator-panel.html"
    },
    "admin": {
        password: "nantesrp2025",
        redirect: "admin-panel.html"
    }
};

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const error = document.getElementById("errorMessage");

    if (accounts[user] && accounts[user].password === pass) {
        // Redirection selon le rôle
        window.location.href = accounts[user].redirect;
    } else {
        error.textContent = "❌ Identifiants incorrects.";
    }
});
</script>

</body>
</html>
