<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Staff - Nantes RP</title>
    <link rel="stylesheet" href="css/connexion.css">
</head>
<body>

<div class="login-container">
    <h2>Connexion Staff</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Nom d'utilisateur" required>
        <input type="password" id="password" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>

    <p id="errorMessage"></p>
</div>

<script>
// Empêche le rechargement du formulaire
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();
    login();
});

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMessage = document.getElementById("errorMessage");

    errorMessage.textContent = ""; // reset

    try {
        const res = await fetch("https://tunnel-i7y1.onrender.com/api5000/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.status === "ok") {
            // Stockage du token + rôle
            localStorage.setItem("sessionToken", data.token);
            localStorage.setItem("userRole", data.role);

            // Redirection selon le rôle
            if (data.role === "admin") {
                window.location.href = "admin-panel.html";
            } 
            else if (data.role === "moderator") {
                window.location.href = "moderator-panel.html";
            }
            else if (data.role === "fonda") {
                window.location.href = "foundation-panel.html";
            }
            else {
                errorMessage.textContent = "❌ Rôle inconnu.";
            }

        } else {
            errorMessage.textContent = "❌ Identifiants incorrects.";
        }

    } catch (err) {
        console.error(err);
        errorMessage.textContent = "❌ Impossible de contacter le serveur.";
    }
}
</script>

</body>
</html>
