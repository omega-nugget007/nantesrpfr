<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Nantes RP</title>
    <link rel="stylesheet" href="css/admin-panel.css">
</head>
<body>

<script>
const token = localStorage.getItem("sessionToken");
const role = localStorage.getItem("userRole");

// Pas connecté → retour login
if (!token) {
    window.location.href = "connexion.html";
}

// Pas admin → retour login
if (role !== "admin") {
    window.location.href = "connexion.html";
}
</script>



<header>
    <div class="nav-container">
        <h1 class="logo">Nantes <span>RP</span></h1>

        <nav class="navbar">
            <a href="index.html">Accueil</a>
            <a href="jobs.html">Métiers</a>
            <a href="recrutements.html">Recrutements</a>
            <a href="candidatureStaff.html">Devenir Testeur Roblox</a>
            <a href="connexion.html">Déconnexion</a>
        </nav>
    </div>
</header>

<section class="panel-section">

    <h2>Panel Administrateur</h2>

    <!-- COMMANDES -->
    <div class="commands-card">
        <h3>Commandes Admin</h3>

        <textarea id="announceText" placeholder="Texte de l'annonce..."></textarea>
        <button onclick="sendAnnouncement()">📢 Envoyer une annonce</button>

        <p id="cmdStatus"></p>
    </div>

</section>

<section class="panel-section">

    <h2>Statistiques du Jeu Roblox</h2>

    <div class="stats-card">

    <h3>Répartition par équipes</h3>
    <div id="teams"></div>

</div>

</section>

<script>
// ====== CONFIG ======
const ADMIN_API = "https://tunnel-i7y1.onrender.com/api3000/announce"; 

// ====== ANNONCES ======
async function sendAnnouncement() {
    const text = document.getElementById("announceText").value;

    if (!text.trim()) {
        document.getElementById("cmdStatus").textContent = "❌ Le texte est vide.";
        return;
    }

    try {
        const res = await fetch(ADMIN_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                text: text,
                senderUserId: 1,
                senderName: "Admin Panel"
            })
        });

        const data = await res.json();

        if (data.status === "ok") {
            document.getElementById("cmdStatus").textContent = "✔ Annonce envoyée !";
        } else {
            document.getElementById("cmdStatus").textContent = "❌ Erreur : " + data.error;
        }

    } catch (err) {
        console.error(err);
        document.getElementById("cmdStatus").textContent = "❌ Erreur API.";
    }
}
</script>

<script>
// ====== CONFIG ======
const API_URL = "https://tunnel-i7y1.onrender.com/api4000/stats"; // Ton API Render

async function loadStats() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // ====== TEAMS ======
        const teamsContainer = document.getElementById("teams");
        teamsContainer.innerHTML = ""; // reset

        for (const teamName in data.teams) {
            const count = data.teams[teamName];

            const div = document.createElement("div");
            div.className = "team-line";
            div.innerHTML = `<strong>${teamName} :</strong> ${count} joueur(s)`;

            teamsContainer.appendChild(div);
        }

    } catch (err) {
        console.error(err);
        document.getElementById("gameName").textContent = "Erreur API";
    }
}

// Refresh toutes les 10 secondes
loadStats();
setInterval(loadStats, 10000);
</script>

</body>
</html>
