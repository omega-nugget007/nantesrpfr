<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidature Staff</title>
<link rel="stylesheet" href="css/candidatureStaff.css">
</head>
<body>
<header>
  <h2>Candidature Staff</h2>
</header>
<main>
  <h1>Postuler au Staff</h1>
  <form id="staffForm">
    <label for="prenom">Prénom :</label>
    <input type="text" id="prenom" name="prenom" required>

    <label for="age">Âge :</label>
    <input type="number" id="age" name="age" min="10" max="100" required>

    <label for="motivations">Motivations :</label>
    <textarea id="motivations" name="motivations" rows="4" required></textarea>

    <label for="experience">Expérience :</label>
    <textarea id="experience" name="experience" rows="4" required></textarea>

    <label for="email">Adresse e-mail :</label>
    <input type="email" id="email" name="email" required>

    <div class="checkbox">
      <input type="checkbox" id="rgpd" name="rgpd" required>
      <label for="rgpd">J'accepte que mon e-mail soit stocké et utilisé pour la réponse du recrutement staff.</label>
    </div>

    <button type="submit">Envoyer ma candidature</button>
    <div id="message"></div>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="staffCandidature.js"></script>
<script src="staff panel.js"></script>
</body>
</html>
