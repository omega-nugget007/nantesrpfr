<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Candidature Staff - Nantes RP</title>
    <link rel="stylesheet" href="css/candidatureStaff.css">
</head>
<body>

<header>
    <div class="nav-container">
        <h1 class="logo">Nantes <span>RP</span></h1>

        <nav class="navbar">
            <a href="index.html">Accueil</a>
            <a href="jobs.html">Métiers</a>
            <a href="recrutements.html">Recrutements Métiers</a>
            <a href="candidatureStaff.html" class="active">Recrutements Staffs/Testeurs </a>
            <a href="connexion.html">Connexion Staff</a>
        </nav>
    </div>
</header>

<section class="form-section">

    <h2>Candidature Staff</h2>

    <form id="staffForm">

        <input type="text" id="discordPseudo" placeholder="Pseudo Discord" required>
        <input type="text" id="discordID" placeholder="ID Discord (ex: 123456789012345678)" required>
        <input type="number" id="age" placeholder="Âge" required>

        <select id="grade" required>
            <option value="TESTEUR JEU ROBLOX">Testeur Jeu Roblox</option>
            <option value="GERANT STAFF">Gérant Staff (vous devez etre staff pour postuler) </option>
        </select>

        <textarea id="motivations" placeholder="Motivations" required></textarea>
        <textarea id="experience" placeholder="Expérience" required></textarea>

        <div class="checkbox">
            <input type="checkbox" id="rgpd" required>
            <label for="rgpd">J'accepte que mes informations soient utilisées pour le recrutement staff.</label>
        </div>

        <button type="submit">Envoyer ma candidature</button>
    </form>

    <p id="message"></p>
</section>

  <footer class="site-footer">
  <div class="footer-content">
    <div class="footer-section">

<!-- SCRIPT FIREBASE -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD639mBtKXqsyk8oNo9pHvoZfJbTyN8Dz8",
        authDomain: "candidatures-staffs-nantesrp.firebaseapp.com",
        projectId: "candidatures-staffs-nantesrp",
        storageBucket: "candidatures-staffs-nantesrp.firebasestorage.app",
        messagingSenderId: "831554643101",
        appId: "1:831554643101:web:8f764468ee535628b5e074"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function peutCandidater(discordID) {
        const q = query(
            collection(db, "candidatures_staff"),
            where("discordID", "==", discordID),
            orderBy("date", "desc"),
            limit(1)
        );

        const snap = await getDocs(q);

        if (snap.empty) return { ok: true };

        const last = snap.docs[0].data();

        if (last.accepte === "true") return { ok: false, reason: "accepted" };
        if (last.accepte === "N/A") return { ok: false, reason: "pending" };
        if (last.accepte === "false") return { ok: true };

        return { ok: true };
    }

    async function envoyerStaff() {
    const age = document.getElementById("age").value;
    const discordPseudo = document.getElementById("discordPseudo").value;
    const discordID = document.getElementById("discordID").value;
    const grade = document.getElementById("grade").value;
    const motivations = document.getElementById("motivations").value;
    const experience = document.getElementById("experience").value;
    const gradeClean = grade.replace(/\s+/g, "_").toUpperCase();

    const check = await peutCandidater(discordID);

    if (!check.ok) {
        if (check.reason === "accepted") {
            document.getElementById("message").textContent =
                "❌ Vous avez déjà été accepté. Vous ne pouvez plus refaire une candidature staff.";
        } else if (check.reason === "pending") {
            document.getElementById("message").textContent =
                "❌ Votre candidature précédente est encore en attente. Merci de patienter.";
        }
        return;
    }

    // 🔥 AJOUTE CES DEUX LIGNES ICI
    console.log("GradeClean =", gradeClean);
    console.log("Collection utilisée =", gradeClean);

    await addDoc(collection(db, gradeClean), {
        age,
        discordPseudo,
        discordID,
        grade,
        motivations,
        experience,
        typeRecrutement: gradeClean,
        accepte: "N/A",
        date: new Date()
    });

    document.getElementById("message").textContent =
        "Candidature envoyée avec succès !";
}


    document.getElementById("staffForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        await envoyerStaff();
        e.target.reset();
    });
</script>

</body>
</html>
