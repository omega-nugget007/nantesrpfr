<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidature Staff</title>
<link rel="stylesheet" href="css/candidatureStaff.css">
</head>

<body>
<header>
  <h2>Candidature Staff</h2>
</header>

<main>
  <h1>Postuler au Staff</h1>

  <form id="staffForm">
    <label for="prenom">Pseudo Discord</label>
    <input type="text" id="discord" required>

    <label for="age">Âge :</label>
    <input type="number" id="age" min="10" max="100" required>

    <label for="motivations">Motivations :</label>
    <textarea id="motivations" rows="4" required></textarea>

    <label for="experience">Expérience :</label>
    <textarea id="experience" rows="4" required></textarea>


    <div class="checkbox">
      <input type="checkbox" id="rgpd" required>
      <label for="rgpd">J'accepte que mon e-mail soit stocké et utilisé pour la réponse du recrutement staff.</label>
    </div>

    <button type="submit">Envoyer ma candidature</button>
    <div id="message"></div>
  </form>
</main>

<!-- 🔥 SCRIPT FIREBASE + ENVOI DES DONNÉES -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBM3qoHPjaQGEMNem_dMf9c0OgtDBW7pD0",
    authDomain: "candidatures-nantesrp.firebaseapp.com",
    projectId: "candidatures-nantesrp",
    storageBucket: "candidatures-nantesrp.appspot.com",
    messagingSenderId: "224090316450",
    appId: "1:224090316450:web:cbe053f80d363bfed481fb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 Fonction d’envoi des candidatures STAFF
  async function envoyerStaff() {
    const discord = document.getElementById("discord").value;
    const age = document.getElementById("age").value;
    const motivations = document.getElementById("motivations").value;
    const experience = document.getElementById("experience").value;

    await addDoc(collection(db, "candidatures_staff"), {
      discord,
      age,
      motivations,
      experience,
      date: new Date()
    });

    document.getElementById("message").textContent = "Candidature envoyée avec succès !";
  }

  // 🔥 Empêcher le rechargement + appeler envoyerStaff()
  document.getElementById("staffForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    await envoyerStaff();
    e.target.reset();
  });
</script>

</body>
</html>
